name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          tar czf - \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            --exclude='app/ml/model' \
            . | ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /opt/bank-marketing-predictor && tar xzf - -C /opt/bank-marketing-predictor/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP=bank-marketing-predictor
            DEPLOY_DIR=/opt/$APP
            HOST_PORT=8501
            CONTAINER_PORT=8501

            cd $DEPLOY_DIR

            # Stop old container first so port is freed
            docker rm -f $APP 2>/dev/null || true

            # Build Docker image
            docker build \
              --build-arg PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple \
              -t $APP:latest .

            # Wait for port to be fully released
            for i in $(seq 1 10); do
              if ! ss -ltnH 2>/dev/null | grep -q ":$HOST_PORT "; then
                echo ">> Port $HOST_PORT is free"
                break
              fi
              echo ">> Port $HOST_PORT still busy, waiting... ($i/10)"
              sleep 1
            done

            echo ">> Deploying to fixed port $HOST_PORT"

            # Run new container
            docker run -d \
              --name $APP \
              --restart unless-stopped \
              -p ${HOST_PORT}:${CONTAINER_PORT} \
              $APP:latest

            sleep 5

            # Health check
            curl -fsS --retry 5 --retry-delay 3 \
              "http://localhost:${HOST_PORT}/_stcore/health"
            echo ""
            echo ">> Deploy success: http://${{ secrets.SSH_HOST }}:${HOST_PORT}"
