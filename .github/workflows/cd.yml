name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP=bank-marketing-predictor
            DEPLOY_DIR=/opt/$APP
            CONTAINER_PORT=8501

            # Fix git ownership issue
            git config --global --add safe.directory $DEPLOY_DIR

            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            # Pull or clone repo
            if [ -d .git ]; then
              echo ">> Existing git repository, pulling latest code"
              git fetch origin main
              git reset --hard origin/main
            else
              echo ">> Not a git repository, cloning fresh"
              rm -rf * .* 2>/dev/null || true
              git clone --depth 1 --branch main \
                https://github.com/${{ github.repository }}.git .
            fi

            # Find available port
            port_in_use() {
              ss -ltnH 2>/dev/null | grep -q ":$1 " && return 0
              docker ps --format "{{.Ports}}" 2>/dev/null | grep -q ":$1->" && return 0
              return 1
            }
            PORT=8501
            PORT_MAX=8510
            for p in $(seq $PORT $PORT_MAX); do
              if ! port_in_use "$p"; then PORT="$p"; break; fi
            done
            [ -z "$PORT" ] && { echo "All ports in $PORT-$PORT_MAX are occupied"; exit 1; }
            echo ">> Deploying to host port $PORT"

            # Build Docker image
            docker build \
              --build-arg PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple \
              -t $APP:latest .

            # Stop & remove old container
            docker rm -f $APP 2>/dev/null || true

            # Wait for port release
            for i in $(seq 1 10); do
              if ! port_in_use "$PORT"; then echo ">> Port $PORT is free"; break; fi
              echo ">> Port $PORT still busy, waiting... ($i/10)"
              sleep 1
            done

            # Run new container
            docker run -d \
              --name $APP \
              --restart unless-stopped \
              -p ${PORT}:${CONTAINER_PORT} \
              $APP:latest

            sleep 5

            # Health check (Streamlit built-in endpoint)
            curl -fsS --retry 5 --retry-delay 3 \
              "http://localhost:${PORT}/_stcore/health"
            echo ""
            echo ">> Deploy success: http://${{ secrets.SSH_HOST }}:${PORT}"
