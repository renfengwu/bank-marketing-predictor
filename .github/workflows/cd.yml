name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync files to server
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude '.ruff_cache' \
            --exclude 'app/ml/model' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/bank-marketing-predictor/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP=bank-marketing-predictor
            DEPLOY_DIR=/opt/$APP
            CONTAINER_PORT=8501

            cd $DEPLOY_DIR

            # Find available port
            port_in_use() {
              ss -ltnH 2>/dev/null | grep -q ":$1 " && return 0
              docker ps --format "{{.Ports}}" 2>/dev/null | grep -q ":$1->" && return 0
              return 1
            }
            PORT=8501
            PORT_MAX=8510
            for p in $(seq $PORT $PORT_MAX); do
              if ! port_in_use "$p"; then PORT="$p"; break; fi
            done
            [ -z "$PORT" ] && { echo "All ports in $PORT-$PORT_MAX are occupied"; exit 1; }
            echo ">> Deploying to host port $PORT"

            # Build Docker image
            docker build \
              --build-arg PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple \
              -t $APP:latest .

            # Stop & remove old container
            docker rm -f $APP 2>/dev/null || true

            # Wait for port release
            for i in $(seq 1 10); do
              if ! port_in_use "$PORT"; then echo ">> Port $PORT is free"; break; fi
              echo ">> Port $PORT still busy, waiting... ($i/10)"
              sleep 1
            done

            # Run new container
            docker run -d \
              --name $APP \
              --restart unless-stopped \
              -p ${PORT}:${CONTAINER_PORT} \
              $APP:latest

            sleep 5

            # Health check (Streamlit built-in endpoint)
            curl -fsS --retry 5 --retry-delay 3 \
              "http://localhost:${PORT}/_stcore/health"
            echo ""
            echo ">> Deploy success: http://${{ secrets.SSH_HOST }}:${PORT}"
